<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap RUP 2026</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Style tambahan -->
    <style>
        .table-row-hover:hover { background-color: #f8fafc; }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">

<!-- HEADER -->
<div class="bg-white shadow p-4 mb-6">
    <h1 class="text-2xl font-bold text-blue-600">
        Rekap RUP 2026
    </h1>
</div>

<div class="max-w-7xl mx-auto px-4">

    <!-- SUMMARY -->
    <div id="summaryCards" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"></div>

    <!-- SEARCH -->
    <input 
        type="text" 
        id="searchInput" 
        placeholder="Cari Satuan Kerja..." 
        class="w-full p-3 mb-6 border rounded-lg"
    >

    <!-- TABLE -->
    <div class="bg-white rounded-xl shadow overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-blue-600 text-white">
                <tr>
                    <th class="p-3 text-left">Satuan Kerja</th>
                    <th class="p-3 text-right">Pagu Program</th>
                    <th class="p-3 text-right">RUP Penyedia</th>
                    <th class="p-3 text-right">RUP Swakelola</th>
                    <th class="p-3 text-right">Total RUP</th>
                    <th class="p-3 text-right">Persentase</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
