<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Rekapitulasi RUP 2026</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
        }

        h1 {
            margin-top: 30px;
        }

        #lastUpdate {
            font-size: 14px;
            color: #555;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        .card {
            display: inline-block;
            padding: 20px;
            margin: 10px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 200px;
        }

        .title {
            font-size: 14px;
            color: #777;
        }

        .value {
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Rekapitulasi RUP Kabupaten Kotawaringin Barat Tahun 2026</h1>

    <div id="lastUpdate">Memuat waktu update...</div>

    <div id="data"></div>

    <script>
        // Ambil rekap.json (anti cache)
        fetch("data/rekap.json?t=" + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                document.getElementById("data").innerHTML = `
                    <div class="card">
                        <div class="title">MASTER</div>
                        <div class="value">${data.MASTER}</div>
                    </div>
                    <div class="card">
                        <div class="title">PENYEDIA</div>
                        <div class="value">${data.PENYEDIA}</div>
                    </div>
                    <div class="card">
                        <div class="title">SWAKELOLA</div>
                        <div class="value">${data.SWAKELOLA}</div>
                    </div>
                    <div class="card">
                        <div class="title">PROGRAM</div>
                        <div class="value">${data.PROGRAM}</div>
                    </div>
                    <div class="card">
                        <div class="title">STRUKTUR</div>
                        <div class="value">${data.STRUKTUR}</div>
                    </div>
                `;
            });

        // Ambil last-update.txt
        fetch("data/last-update.txt?t=" + new Date().getTime())
            .then(res => res.text())
            .then(text => {
                document.getElementById("lastUpdate").innerHTML =
                    "Update terakhir: <b>" + text + "</b>";
            })
            .catch(() => {
                document.getElementById("lastUpdate").innerHTML =
                    "Update terakhir: tidak tersedia";
            });
    </script>

</body>
</html>
