<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekapitulasi RUP Kabupaten Kotawaringin Barat Tahun 2026</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
.filter-popup {
    position: absolute;
    background: white;
    border: 1px solid #ddd;
    padding: 10px;
    z-index: 999;
    width: 250px;
    max-height: 300px;
    overflow: auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body class="bg-gray-100">

<div class="max-w-7xl mx-auto p-6">

<h1 class="text-3xl font-bold mb-6 text-center">
Rekapitulasi RUP Kabupaten Kotawaringin Barat Tahun 2026
</h1>

<div class="flex justify-between mb-4">
<input id="searchInput" placeholder="Cari..." class="px-4 py-2 border rounded w-1/2">
<button onclick="exportExcel()" class="bg-green-600 text-white px-4 py-2 rounded">
Download Excel
</button>
</div>

<!-- SUMMARY -->
<div id="summary" class="bg-white p-4 rounded-xl shadow mb-4 grid grid-cols-2 md:grid-cols-4 gap-4 text-sm"></div>

<div class="bg-white rounded-xl shadow overflow-x-auto relative">
<table class="w-full text-sm">
<thead class="bg-blue-600 text-white">
<tr id="headerRow"></tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>
let data = [];
let filteredData = [];
let filters = {};

// FORMAT
function rupiah(x){
return new Intl.NumberFormat('id-ID',{
style:'currency',
currency:'IDR',
minimumFractionDigits:0
}).format(x||0);
}

// LOAD DATA
async function loadData(){
const res = await fetch("data/rekap.json");
data = await res.json();
filteredData = [...data];

renderHeader();
renderTable();
}

// HEADER
function renderHeader(){
const header = document.getElementById("headerRow");
header.innerHTML = "";

Object.keys(data[0]).forEach(col=>{
header.innerHTML += `
<th class="p-3 cursor-pointer relative" onclick="openFilter(event,'${col}')">
${col} ⏷
</th>`;
});
}

// OPEN FILTER
function openFilter(e,col){
closeAll();

const values = [...new Set(data.map(d=>d[col]))];

const div = document.createElement("div");
div.className = "filter-popup";
div.id = "popup";

div.innerHTML = `
<input type="text" placeholder="Search..." onkeyup="searchFilter(this,'${col}')"
class="border p-1 w-full mb-2">

<label><input type="checkbox" checked onchange="toggleAll('${col}',this)"> Select All</label><br>

<div id="list-${col}">
${values.map(v=>`
<label><input type="checkbox" value="${v}" checked> ${v}</label><br>
`).join("")}
</div>

<button onclick="applyFilter('${col}')" class="bg-blue-600 text-white px-2 py-1 mt-2 w-full">
Apply
</button>
`;

document.body.appendChild(div);
div.style.left = e.pageX + "px";
div.style.top = e.pageY + "px";
}

// CLOSE FILTER
function closeAll(){
const old = document.getElementById("popup");
if(old) old.remove();
}

// SEARCH FILTER
function searchFilter(input,col){
const val = input.value.toLowerCase();

document.querySelectorAll(`#list-${col} label`).forEach(l=>{
l.style.display = l.innerText.toLowerCase().includes(val) ? "" : "none";
});
}

// SELECT ALL
function toggleAll(col,el){
document.querySelectorAll(`#list-${col} input`)
.forEach(cb=>cb.checked = el.checked);
}

// APPLY FILTER
function applyFilter(col){
const checked = [...document.querySelectorAll(`#list-${col} input:checked`)]
.map(cb=>cb.value);

filters[col] = checked;

filteredData = data.filter(row=>{
return Object.keys(filters).every(c=>{
return filters[c].includes(String(row[c]));
});
});

renderTable();
closeAll();
}

// SEARCH GLOBAL
document.getElementById("searchInput").addEventListener("input",e=>{
const val = e.target.value.toLowerCase();

filteredData = data.filter(row=>{
return Object.values(row).some(v=>String(v).toLowerCase().includes(val));
});

renderTable();
});

// RENDER TABLE + SUMMARY
function renderTable(){

// TOTAL
const totalPaguProgram = filteredData.reduce((a,b)=>a+(b["Pagu Program"]||0),0);
const totalPaguPengadaan = filteredData.reduce((a,b)=>a+(b["Pagu Pengadaan"]||0),0);
const totalRup = filteredData.reduce((a,b)=>a+(b["Total RUP Terumumkan"]||0),0);

// PERSEN TOTAL
const persenTotal = totalPaguPengadaan === 0 ? 0 : (totalRup / totalPaguPengadaan * 100);

// SUMMARY
document.getElementById("summary").innerHTML = `
<div><b>Pagu Program</b><br>${rupiah(totalPaguProgram)}</div>
<div><b>Pagu Pengadaan</b><br>${rupiah(totalPaguPengadaan)}</div>
<div><b>Total RUP</b><br>${rupiah(totalRup)}</div>
<div><b>Persentase</b><br>${persenTotal.toFixed(2)}%</div>
`;

// TABLE (SEMUA DATA)
document.getElementById("tableBody").innerHTML = filteredData.map(d=>`
<tr class="border-b hover:bg-gray-50">
${Object.keys(d).map(k=>{
if(k.includes("Pagu")||k.includes("RUP"))
return `<td class="p-2 text-right">${rupiah(d[k])}</td>`;

if(k==="Persentase")
return `<td class="p-2 text-right">${d[k].toFixed(2)}%</td>`;

return `<td class="p-2">${d[k]}</td>`;
}).join("")}
</tr>
`).join("");

}

// EXPORT
function exportExcel(){
const ws = XLSX.utils.json_to_sheet(filteredData);
const wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "RUP");
XLSX.writeFile(wb, "Rekap_RUP_2026.xlsx");
}

// INIT
loadData();

// CLOSE POPUP CLICK OUTSIDE
document.addEventListener("click", e=>{
if(!e.target.closest(".filter-popup") && !e.target.closest("th")){
closeAll();
}
});
</script>

</body>
</html>
