<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekap RUP 2026 - INAPROC Auto</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
<header class="bg-white shadow p-4">
    <h1 class="text-2xl font-bold">Rekap RUP 2026</h1>
</header>
<main class="max-w-6xl mx-auto p-4">
    <div class="mb-4">
        <button onclick="exportExcel()" class="px-4 py-2 bg-green-600 text-white rounded">Export Excel</button>
        <button onclick="refreshData()" class="px-4 py-2 bg-blue-600 text-white rounded">Refresh</button>
    </div>
    <div id="summary" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4"></div>
    <div class="overflow-x-auto">
        <table class="min-w-full bg-white" id="dataTable">
            <thead>
                <tr>
                    <th class="border px-4 py-2 text-left">Satuan Kerja</th>
                    <th class="border px-4 py-2 text-right">Pagu Program</th>
                    <th class="border px-4 py-2 text-right">RUP Penyedia</th>
                    <th class="border px-4 py-2 text-right">RUP Swakelola</th>
                    <th class="border px-4 py-2 text-right">Total RUP</th>
                    <th class="border px-4 py-2 text-right">Persentase</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <canvas id="chartRUP" class="mt-8"></canvas>
</main>
<script src="script.js"></script>
</body>
</html>
