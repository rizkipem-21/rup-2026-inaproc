<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap RUP 2026 - INAPROC Auto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .table-row-hover:hover { background-color: #f8fafc !important; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen loading">
    <!-- Loading -->
    <div id="loadingScreen" class="fixed inset-0 bg-white/90 backdrop-blur-md flex items-center justify-center z-50">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-lg font-semibold text-gray-700">Mengambil data dari INAPROC...</p>
            <p class="text-sm text-gray-500 mt-1">Sabar ya, sebentar lagi 😊</p>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md shadow-lg sticky top-0 z-40 border-b">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                        <i class="fas fa-chart-line mr-3"></i>Rekap RUP 2026
                    </h1>
                    <p class="text-gray-600 mt-1">Auto Update dari INAPROC - KLPD D228</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="exportExcel()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-xl font-medium flex items-center gap-2">
                        <i class="fas fa-file-excel"></i> Excel
                    </button>
                    <button onclick="printTable()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl font-medium flex items-center gap-2">
                        <i class="fas fa-print"></i> Print
                    </button>
                    <button onclick="refreshData()" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-xl font-medium flex items-center gap-2">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8" id="summaryCards">
            <!-- Auto generate -->
        </div>

        <!-- Search -->
        <div class="bg-white/70 backdrop-blur-md rounded-2xl p-6 shadow-xl mb-8">
            <div class="flex flex-col md:flex-row gap-4 items-center">
                <input type="text" id="searchInput" placeholder="🔍 Cari Satuan Kerja..." 
                       class="flex-1 px-5 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 bg-white">
                <div class="flex gap-2">
                    <select id="sortSelect" class="px-4 py-3 border border-gray-200 rounded-xl">
                        <option value="nama">A-Z</option>
                        <option value="rup">RUP Terbesar</option>
                        <option value="persentase">Persentase</option>
                    </select>
                    <button onclick="toggleFilter()" class="px-6 py-3 bg-blue-600 text-white rounded-xl font-medium">
                        <i class="fas fa-filter"></i> Filter
                    </button>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white/70 backdrop-blur-md rounded-3xl shadow-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full" id="dataTable">
                    <thead class="bg-gradient-to-r from-blue-600 to-purple-600 text-white">
                        <tr>
                            <th class="px-6 py-4 text-left font-semibold">Satuan Kerja</th>
                            <th class="px-6 py-4 text-right font-semibold">Pagu Program</th>
                            <th class="px-6 py-4 text-right font-semibold">RUP Penyedia</th>
                            <th class="px-6 py-4 text-right font-semibold">RUP Swakelola</th>
                            <th class="px-6 py-4 text-right font-semibold">Total RUP</th>
                            <th class="px-6 py-4 text-right font-semibold">Persentase</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="px-6 py-4 bg-gray-50 flex justify-between items-center" id="pagination">
                <!-- Auto generate -->
            </div>
        </div>
    </div>

    <script>
        let data = [], filteredData = [], currentPage = 1;
        const ITEMS_PER_PAGE = 15;

        // Format Rupiah
        function formatRupiah(angka) {
            if (!angka || angka === 'N/A') return 'Rp 0';
            return new Intl.NumberFormat('id-ID', {
                style: 'currency', currency: 'IDR', minimumFractionDigits: 0
            }).format(parseFloat(angka));
        }

        // Load data dari API
        async function loadData() {
            try {
                const res = await axios.get('/.netlify/functions/api-rup');
                data = res.data;
                filteredData = [...data];
                renderTable();
                updateSummary();
            } catch(e) {
                console.error('Error:', e);
                document.getElementById('loadingScreen').innerHTML = 
                    '<div class="text-center p-8"><p class="text-red-600 text-xl">Error koneksi API</p><button onclick="loadData()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-xl">Coba lagi</button></div>';
            }
        }

        // Render table
        function renderTable() {
            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            const pageData = filteredData.slice(start, end);

            document.getElementById('tableBody').innerHTML = pageData.map(row => `
                <tr class="table-row-hover h-16 border-b hover:shadow-sm">
                    <td class="px-6 py-4 font-medium text-gray-900 max-w-[300px] truncate">${row['Satuan Kerja'] || '-'}</td>
                    <td class="px-6 py-4 text-right text-sm">${formatRupiah(row['Pagu Program'])}</td>
                    <td class="px-6 py-4 text-right text-sm text-green-600">${formatRupiah(row['RUP Penyedia'])}</td>
                    <td class="px-6 py-4 text-right text-sm text-blue-600">${formatRupiah(row['RUP Swakelola'])}</td>
                    <td class="px-6 py-4 text-right font-bold text-lg text-gray-900">${formatRupiah(row['Total RUP Terumumkan'])}</td>
                    <td class="px-6 py-4 text-right font-bold text-xl ${row['Persentase'] >= 90 ? 'text-green-600' : row['Persentase'] < 50 ? 'text-red-600' : 'text-yellow-600'}">${row['Persentase'] || '0%'}</td>
                </tr>
            `).join('');
            updatePagination();
        }

        // Update summary
        function updateSummary() {
            const totalSatker = filteredData.length;
            const totalRup = filteredData.reduce((sum, row) => sum + (parseFloat(row['Total RUP Terumumkan']) || 0), 0);
            const avgPersentase = filteredData.reduce((sum, row) => sum + (parseFloat(row['Persentase']) || 0), 0) / totalSatker;

            document.getElementById('summaryCards').innerHTML = `
                <div class="bg-white/70 p-6 rounded-2xl shadow-xl">
                    <p class="text-sm text-gray-600">Total Satker</p>
                    <p class="text-3xl font-bold text-blue-600">${totalSatker.toLocaleString()}</p>
                </div>
                <div class="bg-white/70 p-6 rounded-2xl shadow-xl">
                    <p class="text-sm text-gray-600">Total RUP</p>
                    <p class="text-3xl font-bold text-green-600">${formatRupiah(totalRup)}</p>
                </div>
                <div class="bg-white/70 p-6 rounded-2xl shadow-xl">
                    <p class="text-sm text-gray-600">Rata-rata %</p>
                    <p class="text-3xl font-bold text-purple-600">${avgPersentase.toFixed(1)}%</p>
                </div>
                <div class="bg-white/70 p-6 rounded-2xl shadow-xl">
                    <p class="text-sm text-gray-600">Terupdate</p>
                    <p class="text-xl font-bold text-gray-900" id="lastUpdate">${new Date().toLocaleString('id-ID')}</p>
                </div>
            `;
        }

        // Pagination
        function updatePagination() {
            const totalPages = Math.ceil(filteredData.length / ITEMS_PER_PAGE);
            document.getElementById('pagination').innerHTML = `
                <div class="text-sm text-gray-700">
                    Menampilkan ${Math.min((currentPage-1)*ITEMS_PER_PAGE + 1, filteredData.length)}-${Math.min(currentPage*ITEMS_PER_PAGE, filteredData.length)} dari ${filteredData.length}
                </div>
                <div class="flex gap-2">
                    <button onclick="currentPage>1 && (currentPage--,renderTable())" class="px-4 py-2 bg-gray-200 rounded-xl ${currentPage===1?'opacity-50':''}">← Prev</button>
                    <span class="px-4 py-2 font-medium">${currentPage}/${totalPages}</span>
                    <button onclick="currentPage<totalPages && (currentPage++,renderTable())" class="px-4 py-2 bg-gray-200 rounded-xl ${currentPage===totalPages?'opacity-50':''}">Next →</button>
                </div>
            `;
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const value = e.target.value.toLowerCase();
            filteredData = data.filter(row => row['Satuan Kerja']?.toLowerCase().includes(value));
            currentPage = 1;
            renderTable();
            updateSummary();
        });

        // Export Excel
        function exportExcel() {
            const ws = XLSX.utils.json_to_sheet(filteredData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "RUP 2026");
            XLSX.writeFile(wb, `RUP_2026_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        // Print
        function printTable() { window.print(); }

        // Refresh
        async function refreshData() { await loadData(); }

        // Init
        loadData().then(() => {
            document.body.classList.remove('loading');
            document.getElementById('loadingScreen').style.display = 'none';
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</body>
</html>
