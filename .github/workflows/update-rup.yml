name: Update RUP Data

on:
  schedule:
    - cron: "0 22 * * *"   # Jam 05:00 WIB
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # =========================================
      # AMBIL REPO
      # =========================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================
      # BUAT FOLDER DATA
      # =========================================
      - name: Create data folder
        run: mkdir -p data

      # =========================================
      # DOWNLOAD DATA (GANTI URL NYA)
      # =========================================
      - name: Download JSON Data
        run: |
          echo "Download Penyedia..."
          curl -L "ISI_URL_PENYEDIA" -o data/Legacy_rup_paket-penyedia-terumumkan_2026.json

          echo "Download Swakelola..."
          curl -L "ISI_URL_SWAKELOLA" -o data/Legacy_rup_paket-swakelola-terumumkan_2026.json

          echo "Download Master Satker..."
          curl -L "ISI_URL_MASTER_SATKER" -o data/Legacy_rup_master-satker_2026.json

          echo "Download Program..."
          curl -L "ISI_URL_PROGRAM" -o data/Legacy_rup_program-master_2026.json

          echo "Download Struktur..."
          curl -L "ISI_URL_STRUKTUR" -o data/Legacy_rup_struktur-anggaran-pd_2026.json

      # =========================================
      # INSTALL PYTHON + PANDAS
      # =========================================
      - name: Install dependencies
        run: pip install pandas

      # =========================================
      # BUAT SCRIPT PYTHON
      # =========================================
      - name: Generate Python Script
        run: |
          cat << 'EOF' > generate.py
import pandas as pd
import json
import os

def load_json(path):
    if not os.path.exists(path):
        return []
    with open(path, 'r', encoding='utf-8-sig') as f:
        try:
            return json.load(f)
        except:
            return []

base = "data"

df_master   = pd.DataFrame(load_json(f"{base}/Legacy_rup_master-satker_2026.json"))
df_penyedia = pd.DataFrame(load_json(f"{base}/Legacy_rup_paket-penyedia-terumumkan_2026.json"))
df_swakelola= pd.DataFrame(load_json(f"{base}/Legacy_rup_paket-swakelola-terumumkan_2026.json"))
df_program  = pd.DataFrame(load_json(f"{base}/Legacy_rup_program-master_2026.json"))
df_struktur = pd.DataFrame(load_json(f"{base}/Legacy_rup_struktur-anggaran-pd_2026.json"))

# FILTER MASTER
df_master = df_master[df_master['tahun_aktif'].astype(str).str.contains('2026', na=False)]

master_satker = df_master[['kd_satker','nama_satker']].drop_duplicates()
master_satker.rename(columns={'nama_satker':'Satuan Kerja'}, inplace=True)

# PENYEDIA
rup_penyedia = df_penyedia.groupby('kd_satker', as_index=False)['pagu'].sum()
rup_penyedia.rename(columns={'pagu':'RUP Penyedia'}, inplace=True)

# SWAKELOLA
rup_swakelola = df_swakelola.groupby('kd_satker', as_index=False)['pagu'].sum()
rup_swakelola.rename(columns={'pagu':'RUP Swakelola'}, inplace=True)

# PROGRAM
df_program = df_program.drop_duplicates(
    subset=['kd_satker','nama_program','kd_program_str','kd_program']
)

df_program = df_program[
    ~df_program['nama_program'].astype(str).str.strip().str.contains(r'( M$|\(M\)$)', regex=True)
]

pagu_program = df_program.groupby('kd_satker', as_index=False)['pagu_program'].sum()
pagu_program.rename(columns={'pagu_program':'Pagu Program'}, inplace=True)

# STRUKTUR
struktur = df_struktur.groupby('kd_satker', as_index=False)[['belanja_pengadaan','belanja_non_pengadaan']].sum()
struktur.rename(columns={
    'belanja_pengadaan':'Pagu Pengadaan',
    'belanja_non_pengadaan':'Belanja Non Pengadaan'
}, inplace=True)

# MERGE
df = master_satker.merge(pagu_program, on='kd_satker', how='left')
df = df.merge(rup_penyedia, on='kd_satker', how='left')
df = df.merge(rup_swakelola, on='kd_satker', how='left')
df = df.merge(struktur, on='kd_satker', how='left')

# ISI NULL
for col in ['Pagu Program','RUP Penyedia','RUP Swakelola','Pagu Pengadaan','Belanja Non Pengadaan']:
    df[col] = df[col].fillna(0)

# HITUNG
df['Total RUP Terumumkan'] = df['RUP Penyedia'] + df['RUP Swakelola']

df['Persentase'] = df.apply(
    lambda x: round((x['Total RUP Terumumkan']/x['Pagu Program']*100),2)
    if x['Pagu Program'] > 0 else 0,
    axis=1
)

# PILIH KOLOM
df = df[[
    'Satuan Kerja',
    'Pagu Program',
    'RUP Penyedia',
    'RUP Swakelola',
    'Total RUP Terumumkan',
    'Persentase'
]]

# SORT
df['_sort'] = df['Satuan Kerja'].str.lower()
df = df.sort_values('_sort').drop(columns='_sort')

# SIMPAN JSON
df.to_json(f"{base}/rekap.json", orient="records", indent=2)

print("rekap.json OK")
EOF

      # =========================================
      # JALANKAN PYTHON
      # =========================================
      - name: Run Python Script
        run: python generate.py

      # =========================================
      # COMMIT HASIL KE GITHUB
      # =========================================
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/*
          git commit -m "update data otomatis" || echo "no changes"
          git push
