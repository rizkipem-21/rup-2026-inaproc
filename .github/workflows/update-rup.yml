name: Update RUP Data

on:
  schedule:
    - cron: "0 1 * * *"  # setiap hari jam 08:00 WIB
  workflow_dispatch:     # bisa run manual

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Download data dari API
        run: |
          curl -L "https://sirup.lkpp.go.id/sirup/ro/rekapKldiDipaSatker?idTahun=2026" \
          -o data/rup.json

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/rup.json
          git commit -m "Update data RUP otomatis" || echo "No changes"
          git push
