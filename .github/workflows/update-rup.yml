name: Update RUP Data

on:
  schedule:
    - cron: '0 22 * * *'   # 05:00 WIB
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    env:
      INAPROC_TOKEN: ${{ secrets.INAPROC_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch & Build Rekap
        run: |
          python <<EOF
          import requests, json, os

          os.makedirs("data", exist_ok=True)

          TOKEN = os.getenv("INAPROC_TOKEN")

          if not TOKEN:
              print("TOKEN TIDAK TERBACA!")
              with open("data/rekap.json", "w") as f:
                  json.dump([], f)
              exit()

          headers = {
              "Authorization": f"Bearer {TOKEN}"
          }

          urls = {
              "penyedia": "https://data.inaproc.id/api/legacy/rup/paket-penyedia-terumumkan?kode_klpd=D228&tahun=2026",
              "swakelola": "https://data.inaproc.id/api/legacy/rup/paket-swakelola-terumumkan?kode_klpd=D228&tahun=2026",
              "master": "https://data.inaproc.id/api/legacy/rup/master-satker?kode_klpd=D228&tahun=2026"
          }

          def ambil(url):
              try:
                  r = requests.get(url, headers=headers, timeout=60)

                  print("URL:", url)
                  print("STATUS:", r.status_code)

                  if r.status_code != 200:
                      print("RESP:", r.text[:200])
                      return []

                  data = r.json()

                  if isinstance(data, dict) and "data" in data:
                      return data["data"]

                  if isinstance(data, list):
                      return data

                  return []

              except Exception as e:
                  print("ERROR:", e)
                  return []

          penyedia = ambil(urls["penyedia"])
          swakelola = ambil(urls["swakelola"])
          master = ambil(urls["master"])

          print("Jumlah master:", len(master))
          print("Jumlah penyedia:", len(penyedia))
          print("Jumlah swakelola:", len(swakelola))

          if len(master) == 0:
              print("MASTER KOSONG -> STOP")
              with open("data/rekap.json", "w") as f:
                  json.dump([], f)
              exit()

          rekap = {}

          for row in master:
              kd = row.get("kd_satker")
              if not kd:
                  continue

              rekap[kd] = {
                  "Satuan Kerja": row.get("nama_satker"),
                  "RUP Penyedia": 0,
                  "RUP Swakelola": 0
              }

          for row in penyedia:
              kd = row.get("kd_satker")
              if kd in rekap:
                  rekap[kd]["RUP Penyedia"] += float(row.get("pagu", 0))

          for row in swakelola:
              kd = row.get("kd_satker")
              if kd in rekap:
                  rekap[kd]["RUP Swakelola"] += float(row.get("pagu", 0))

          hasil = list(rekap.values())

          with open("data/rekap.json", "w", encoding="utf-8") as f:
              json.dump(hasil, f, indent=2, ensure_ascii=False)

          print("rekap.json berhasil dibuat:", len(hasil))
          EOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/rekap.json
          git commit -m "update data otomatis" || echo "no changes"
          git push
