name: Update RUP INAPROC

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write   # ✅ INI PENTING

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Buat folder data
        run: mkdir -p data

      - name: Download semua endpoint
        run: |
          set +e

          TOKEN="inprc7642391c38774272bf57ca25ac1d4544"
          BASE_URL="https://data.inaproc.id/api/legacy/rup"
          KODE="D228"
          TAHUN="2026"

          endpoints=(
            "paket-penyedia-terumumkan"
            "paket-swakelola-terumumkan"
            "master-satker"
            "program-master"
            "struktur-anggaran-pd"
          )

          for ep in "${endpoints[@]}"; do

            url="$BASE_URL/$ep?kode_klpd=$KODE&tahun=$TAHUN"
            filename="data/Legacy_${ep}_${TAHUN}.json"

            echo "Download: $url"

            http_code=$(curl -s -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              "$url" -o response.json)

            if [ "$http_code" != "200" ]; then
              echo "[]" > $filename
              continue
            fi

            jq . response.json > $filename 2>/dev/null

            if [ $? -ne 0 ]; then
              echo "[]" > $filename
            fi

          done

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "Update data RUP otomatis" || echo "No changes"
          git push
