name: Update RUP Data

on:
  schedule:
    - cron: '0 22 * * *'   # 05:00 WIB
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    env:
      INAPROC_TOKEN: ${{ secrets.INAPROC_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install requests

      - name: RUN SCRIPT
        run: |
          python <<EOF
          import requests, json, os

          os.makedirs("data", exist_ok=True)

          TOKEN = os.getenv("INAPROC_TOKEN")
          print("TOKEN:", TOKEN[:10] if TOKEN else "KOSONG")

          headers = {}
          if TOKEN:
              headers["Authorization"] = f"Bearer {TOKEN}"

          url = "https://data.inaproc.id/api/legacy/rup/master-satker?kode_klpd=D228&tahun=2026"

          try:
              r = requests.get(url, headers=headers, timeout=60)

              print("STATUS:", r.status_code)
              print("RESPONSE SAMPLE:", r.text[:300])

              if r.status_code != 200:
                  raise Exception("API ERROR")

              data = r.json()

              if isinstance(data, dict) and "data" in data:
                  data = data["data"]

              print("JUMLAH DATA:", len(data))

              # SIMPAN APA ADANYA DULU (BIAR PASTI ADA ISI)
              with open("data/rekap.json", "w", encoding="utf-8") as f:
                  json.dump(data, f, indent=2, ensure_ascii=False)

              print("BERHASIL SIMPAN")

          except Exception as e:
              print("ERROR:", e)

              with open("data/rekap.json", "w") as f:
                  json.dump([], f)
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/rekap.json
          git commit -m "update data debug" || echo "no changes"
          git push
